<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="light dark">

  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    :root { color-scheme: light dark; }
    html, body { margin:0 !important; padding:0 !important; width:100% !important; height:100% !important; }
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; border-collapse:collapse !important; }
    img { border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; display:block; }
    div[style*="margin: 16px 0"] { margin:0 !important; }

    /* Light mode (default): light backdrop, white card */
    body, .page-bg { background-color:#eef3fb; }
    .shell-card { background-color:#ffffff; border:1px solid #e2ebf7; box-shadow:0 16px 36px rgba(7,67,155,0.06); }

    /* Dark mode: dark backdrop. The artwork is on white, so the card stays
       white to keep the brand font, colours and RTL exactly as designed. */
    @media (prefers-color-scheme: dark) {
      body, .page-bg { background-color:#0b1727 !important; }
      .shell-card { background-color:#ffffff !important; border:1px solid #1f3350 !important; box-shadow:0 16px 40px rgba(0,0,0,0.45) !important; }
      .outer-foot { color:#9fb3cc !important; }
    }
    [data-ogsc] body, [data-ogsc] .page-bg { background-color:#0b1727 !important; }
    [data-ogsc] .shell-card { background-color:#ffffff !important; border:1px solid #1f3350 !important; }
    [data-ogsc] .outer-foot { color:#9fb3cc !important; }

    .slice { width:100%; max-width:600px; height:auto; }
    .preheader { display:none !important; visibility:hidden; opacity:0; color:transparent; height:0; width:0; overflow:hidden; mso-hide:all; }

    @media screen and (max-width:620px) {
      .wrapper { width:100% !important; }
    }
  </style>
</head>

<body style="margin:0; padding:0; direction:rtl; background-color:#eef3fb;">

                <tr><td style="padding:0;"><img src="slices/01.png" alt="الرائدة | Alraedah" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/02.png" alt="حيّ الله عميل الرائدة — أحيانًا تجيك" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/03.png" alt="فرصة توسّع، أو طلبية جديدة، أو احتياج تشغيلي — لكن نقص السيولة يوقفك" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/04.png" alt="مع الرائدة تقدّم على تمويل مشروعك من مكانك بتجربة رقمية بالكامل، وبتمويل يبدأ من" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/05.png" alt="20 ألف ريال ويصل إلى مليون ريال — تمويل مشروعك من مكانك" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/06.png" alt="وكل اللي تحتاجه" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/07.png" alt="01 تدخل إلى موقعنا الرسمي: alraedah.sa" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/08.png" alt="02 اضغط على سجّل الآن أعلى الصفحة ثم اختيار تسجيل الدخول" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
                <tr><td style="padding:0;"><img src="slices/09.png" alt="03 توجّه إلى قسم القروض من القائمة الجانبية" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>

                </td></tr>
                <tr><td style="padding:0;"><img src="slices/12.png" alt="خاضعة لرقابة وإشراف البنك المركزي السعودي • تطبّق الشروط والأحكام — alraedah.sa • alraedahFinance • alraedah.finance.sa • 8001249000" class="slice" width="600" style="width:100%; max-width:600px; height:auto;"></td></tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="outer-foot" align="center" style="padding:16px 20px 4px; font-size:11px; line-height:1.6; color:#9aa9bd; font-family:Tahoma,Arial,sans-serif;">
              شركة الرائدة للتمويل
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

</html>
